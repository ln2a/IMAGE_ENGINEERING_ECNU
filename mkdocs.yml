site_name: 图像工程（2026 师生共享版）
site_description: 图像工程课程在线教程
site_author: ECNU 图像工程课程组
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 各章内容:
      - 第一部分 图像形成与数字图像基础: chapters/ch01-image-formation.md
      - 第二部分 图像增强与滤波: chapters/ch02-enhancement.md
      - 第三部分 锐化与边缘检测: chapters/ch03-sharpening.md
      - 第四部分 图像分割: chapters/ch04-segmentation.md
      - 第五部分 图像特征与目标识别: chapters/ch05-features.md
